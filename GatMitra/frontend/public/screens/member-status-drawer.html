<!-- Simple script to handle radio button visual state changes for demonstration -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const radioButtons = document.querySelectorAll('input[name="member_status"]');
            const labels = document.querySelectorAll('label:has(input[name="member_status"])');

            function updateStyles() {
                labels.forEach(label => {
                    const input = label.querySelector('input');
                    const indicatorOuter = label.querySelector('.rounded-full.border-2');
                    const icon = label.querySelector('.material-symbols-outlined');
                    
                    // Reset classes
                    label.className = 'relative flex items-start p-md cursor-pointer rounded-xl transition-colors group border border-outline-variant bg-surface-container-lowest hover:bg-surface-container-highest';
                    indicatorOuter.innerHTML = '';
                    indicatorOuter.className = 'w-5 h-5 rounded-full border-2 border-outline-variant group-hover:border-on-surface-variant transition-colors';
                    icon.style.fontVariationSettings = "'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24";

                    if (input.checked) {
                        if (input.value === 'active') {
                            label.className = 'relative flex items-start p-md cursor-pointer rounded-xl transition-colors group border-2 border-secondary bg-secondary-container bg-opacity-20';
                            indicatorOuter.className = 'w-5 h-5 rounded-full border-2 border-secondary flex items-center justify-center';
                            indicatorOuter.innerHTML = '<div class="w-2.5 h-2.5 rounded-full bg-secondary"></div>';
                            icon.style.fontVariationSettings = "'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24";
                        } else if (input.value === 'inactive') {
                            label.className = 'relative flex items-start p-md cursor-pointer rounded-xl transition-colors group border-2 border-primary bg-primary-container bg-opacity-10';
                            indicatorOuter.className = 'w-5 h-5 rounded-full border-2 border-primary flex items-center justify-center';
                            indicatorOuter.innerHTML = '<div class="w-2.5 h-2.5 rounded-full bg-primary"></div>';
                            icon.style.fontVariationSettings = "'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24";
                        } else if (input.value === 'blocked') {
                            label.className = 'relative flex items-start p-md cursor-pointer rounded-xl transition-colors group border-2 border-error bg-error-container bg-opacity-20';
                            indicatorOuter.className = 'w-5 h-5 rounded-full border-2 border-error flex items-center justify-center';
                            indicatorOuter.innerHTML = '<div class="w-2.5 h-2.5 rounded-full bg-error"></div>';
                            icon.style.fontVariationSettings = "'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24";
                        }
                    } else {
                        // Keep specific hover colors for blocked when unselected
                        if (input.value === 'blocked') {
                             label.classList.add('hover:bg-error-container', 'hover:border-error');
                             label.classList.remove('hover:bg-surface-container-highest');
                             indicatorOuter.classList.replace('group-hover:border-on-surface-variant', 'group-hover:border-error');
                        }
                    }
                });
            }

            radioButtons.forEach(radio => {
                radio.addEventListener('change', updateStyles);
            });
            
            // Initial run to set blocked specific styles
            updateStyles();
        });
    </script>
