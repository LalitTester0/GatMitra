<script>
        // OTP Input Logic
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            // Allow only numbers
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }
                
                if (e.target.value !== '') {
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                }
            });

            // Handle Backspace
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '') {
                    if (index > 0) {
                        inputs[index - 1].focus();
                        inputs[index - 1].value = '';
                    }
                }
            });
            
            // Handle Paste
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').slice(0, inputs.length).replace(/[^0-9]/g, '');
                
                pastedData.split('').forEach((char, i) => {
                    if(inputs[i]) {
                        inputs[i].value = char;
                        if(i < inputs.length - 1) {
                            inputs[i + 1].focus();
                        } else {
                            inputs[i].blur();
                        }
                    }
                });
            });
        });

        // Timer Logic
        let timeLeft = 60;
        const countdownEl = document.getElementById('countdown');
        const resendBtn = document.getElementById('resendBtn');
        let timerId;

        function startTimer() {
            resendBtn.disabled = true;
            resendBtn.classList.add('text-outline-variant', 'cursor-not-allowed');
            resendBtn.classList.remove('text-primary', 'hover:text-primary-container');
            
            timerId = setInterval(() => {
                timeLeft--;
                countdownEl.textContent = `00:${timeLeft.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    countdownEl.textContent = '00:00';
                    resendBtn.disabled = false;
                    resendBtn.classList.remove('text-outline-variant', 'cursor-not-allowed');
                    resendBtn.classList.add('text-primary', 'hover:text-primary-container', 'font-bold');
                }
            }, 1000);
        }

        startTimer();

        resendBtn.addEventListener('click', () => {
            if (!resendBtn.disabled) {
                timeLeft = 60;
                startTimer();
                // Clear inputs on resend visually
                inputs.forEach(input => input.value = '');
                inputs[0].focus();
            }
        });

        // Form Submit
        document.getElementById('otpForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const otp = Array.from(inputs).map(i => i.value).join('');
            if(otp.length === 6) {
                console.log('Verifying OTP:', otp);
                // Simulate loading state
                const btn = e.target.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = `<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Verifying...`;
                
                // Show success animation
                setTimeout(() => {
                    document.getElementById('card-content').classList.add('hidden');
                    const successContent = document.getElementById('success-content');
                    successContent.classList.remove('hidden');
                    successContent.classList.add('flex');
                }, 1500);
            }
        });
    </script>
